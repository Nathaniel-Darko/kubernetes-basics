apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-challenge-app
  labels:
    app: k8s-challenge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k8s-challenge
  template:
    metadata:
      labels:
        app: k8s-challenge
    spec:
      containers:
        - name: app
          image: k8s-challenge-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http

          # Environment from ConfigMap
          envFrom:
            - configMapRef:
                name: k8s-challenge-config

          # Environment from Secret
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: k8s-challenge-secrets
                  key: api-key

          # Resource limits
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"

          # Liveness probe
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3

          # Readiness probe
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3